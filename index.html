<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>三菱UFJ銀行 入出金明細 テンプレート</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --red: #e60012;
      --border: #bdbdbd;
      --info-bg: #e6e6e6;
      --thead-bg: #d9d9d9;
      --text: #111;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--text);
      background: #d8d8d8;
      font-size: 12px;
    }

    .font-w6 {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W6", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 600;
    }

    .font-w3 {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W3", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 300;
    }

    .font-amount {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W6", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 600;
      font-size: 9.6pt;
    }

    .font-footer-url {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF UI Text", ".SFUI-Regular", "Segoe UI", sans-serif;
      font-weight: 400;
      font-size: 7pt;
      letter-spacing: 0;
    }

    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }

    .panel {
      background: #fff;
      border-right: 1px solid #ccc;
      padding: 14px;
      overflow-y: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }

    .panel h1 { font-size: 15px; margin: 0 0 8px; }
    .panel .hint { font-size: 11px; color: #666; margin: 0 0 14px; line-height: 1.5; }

    .group { margin-bottom: 10px; }
    .group label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 3px; }
    .group input, .group select {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #bbb;
      border-radius: 3px;
      font: inherit;
      font-size: 12px;
    }

    .group input.date-input,
    .tx-editor input.date-input {
      direction: ltr !important;
      text-align: left !important;
      unicode-bidi: plaintext;
      font-variant-numeric: tabular-nums;
    }

    .row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px solid #eee;
    }

    button {
      border: 1px solid #aaa;
      background: #fff;
      padding: 7px 10px;
      border-radius: 3px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }

    button.primary { background: var(--red); color: #fff; border-color: var(--red); }

    .preview-wrap {
      padding: 20px;
      overflow: auto;
      background: #d8d8d8;
    }

    /* ===== 原版式 ===== */
    .sheet {
      width: 190mm;
      min-height: 277mm;
      margin: 0 auto 20px;
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,.15);
      padding: 7mm 6.5mm 8mm;
      position: relative;
      color: #111;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      overflow: hidden;
    }

    .sheet-body {
      flex: 1 1 auto;
      min-height: 0;
    }

    .sheet .tx-table {
      flex: 0 0 auto;
    }

    .doc-top { margin-bottom: 6px; }

    .brand-img {
      display: block;
      height: 26px;
      width: auto;
      margin-bottom: 4px;
    }

    .top-rule {
      border: 0;
      border-top: 1px solid #c8c8c8;
      margin: 0 0 7px;
    }

    .info-card {
      position: relative;
      background: #ececec;
      border-radius: 7px;
      padding: 7px 10px 8px;
      min-height: 118px;
    }

    .info-rows {
      padding-right: 132px;
    }

    .info-row {
      display: flex;
      align-items: baseline;
      line-height: 1.55;
      min-height: 16px;
      font-size: 9.6pt;
    }

    .info-row .lbl {
      flex: 0 0 10.6em;
      white-space: nowrap;
      padding-right: 4px;
    }

    .info-row .val {
      flex: 1 1 auto;
      min-width: 0;
      line-height: 1;
    }

    .bank-block {
      position: absolute;
      top: 7px;
      right: 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .bank-lbl {
      display: flex;
      flex-direction: column;
      line-height: 1.35;
      white-space: nowrap;
      font-size: 9.6pt;
    }

    .bank-lbl-sub {
      display: block;
    }

    .bank-val {
      font-size: 9.6pt;
      line-height: 1.35;
      white-space: nowrap;
      padding-top: 1px;
    }

    .status-line {
      font-size: 10.5px;
      margin: 5px 0 6px;
      padding-left: 1px;
      letter-spacing: 0.01em;
    }

    .tx-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 10px;
      line-height: 1.25;
    }

    .tx-table th,
    .tx-table td {
      border: 1px solid var(--border);
      padding: 2px 3px;
      vertical-align: top;
      font-weight: 400;
    }

    .tx-table th {
      background: var(--thead-bg);
      text-align: center;
      font-size: 10px;
      padding: 3px 2px;
      font-weight: 600;
    }

    .tx-table td { font-weight: 300; }

    .tx-table td.col-date,
    .tx-table td.col-desc {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W6", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 600;
    }

    .tx-table .col-date { width: 11%; }
    .tx-table .col-pay { width: 10%; }
    .tx-table .col-dep { width: 10%; }
    .tx-table .col-desc { width: 38%; }
    .tx-table .col-bal { width: 12%; }
    .tx-table .col-memo { width: 19%; }

    .tx-table .num {
      text-align: right;
      white-space: nowrap;
      padding-right: 4px;
    }

    .tx-table td.num {
      text-align: right;
      white-space: nowrap;
      padding-right: 4px;
    }

    .tx-table .amount-digits-strong {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W6", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 600;
      font-size: 9.6pt;
    }

    .tx-table .amount-digits-balance {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W3", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 300;
      font-size: 9.6pt;
    }

    .tx-table .amount-yen-strong {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W3", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 300;
      font-size: 8.8pt;
    }

    .tx-table .amount-yen-balance {
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W3", "Yu Gothic", "Meiryo", sans-serif;
      font-weight: 300;
      font-size: 8.8pt;
    }

    .tx-table .col-desc { padding-left: 4px; }

    .date-cell .date-y { display: block; }
    .date-cell .date-md { display: block; padding-left: 1.2em; }

    .footer {
      position: static;
      margin-top: auto;
      padding-top: 6mm;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      color: #333;
    }

    .footer-meta {
      text-align: right;
      line-height: 1.3;
    }

    .footer-page {
      display: block;
    }

    .doc-bottom {
      margin-top: 8px;
      padding-bottom: 2mm;
    }

    .text-96 {
      font-size: 9.6pt;
    }

    .summary-card {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      align-items: center;
      background: linear-gradient(180deg, #f3f3f3 0%, #e7e7e7 100%);
      border-radius: 8px;
      padding: 8px 14px;
      min-height: 36px;
      line-height: 1;
    }

    .summary-left {
      justify-self: start;
      white-space: nowrap;
    }

    .summary-center {
      justify-self: center;
      white-space: nowrap;
      text-align: center;
    }

    .summary-amount {
      justify-self: end;
      white-space: nowrap;
      text-align: right;
      font-family: "Hiragino Kaku Gothic Pro", "Hiragino Kaku Gothic ProN", "HiraKakuPro-W6", "Yu Gothic", "Meiryo", sans-serif;
      font-size: 16pt;
      font-weight: 600;
      line-height: 1;
      letter-spacing: 0.02em;
    }

    .legal {
      margin-top: 7px;
      color: #222;
      font-size: 9.6pt;
      font-weight: 600;
      line-height: 1;
    }

    .copyright-bar {
      margin: 8px -6.5mm 0;
      background: #d2d2d2;
      text-align: left;
      padding: 5px 10px;
      color: #222;
      font-size: 9.6pt;
      line-height: 1;
    }

    .tx-editor {
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      padding: 8px;
      margin-bottom: 8px;
      background: #fafafa;
    }

    .tx-editor .row-2, .tx-editor .row-3 { margin-bottom: 5px; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; }
    .tx-editor .mini-label { font-size: 10px; color: #666; margin-bottom: 2px; }
    .tx-editor input {
      width: 100%;
      padding: 5px 6px;
      border: 1px solid #ccc;
      border-radius: 3px;
      font-size: 11px;
    }
    .tx-editor .tx-actions { display: flex; justify-content: flex-end; gap: 4px; margin-top: 4px; }
    .tx-editor button { padding: 3px 7px; font-size: 11px; }
.panel .lang-toggle {
      display: inline-flex;
      gap: 0;
      border: 1px solid #aaa;
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .panel .lang-toggle button {
      border: 0;
      border-radius: 0;
      padding: 4px 10px;
      background: #fff;
      font-size: 11px;
      color: #333;
    }
    .panel .lang-toggle button.active {
      background: var(--red);
      color: #fff;
    }
.panel [data-ja][data-zh] { }
    html[lang="zh"] [data-ja-only], html[lang="ja"] [data-zh-only] { display: none; }


@media (max-width: 1050px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: static; height: auto; }
    }

    @media print {
      @page {
        size: A4;
        margin: 8mm;
      }
      body { background: #fff; }
      .panel { display: none !important; }
      .preview-wrap { padding: 0 !important; background: #fff !important; overflow: visible !important; }
      .sheet {
        box-shadow: none !important;
        margin: 0 !important;
        width: auto !important;
        min-height: auto !important;
        height: auto !important;
        max-height: none !important;
        padding: 0 !important;
        page-break-after: always;
        break-after: page;
        overflow: visible !important;
      }
      .sheet:last-child {
        page-break-after: auto;
        break-after: auto;
      }
      .footer {
        position: static !important;
        margin-top: 8mm !important;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1 data-ja="入出金明細 編集" data-zh="入出金明细编辑">入出金明細 編集</h1>
      <div class="lang-toggle" id="lang-toggle">
        <button type="button" data-lang="ja" class="active">日本語</button>
        <button type="button" data-lang="zh">中文</button>
      </div>
      <p class="hint" data-ja="期間を変更すると表格内の全日期行が自動再生成します。" data-zh="更改期间后自动生成全部日期，约七成日期填充NPO交易，余额与合计自动联动。">期间変更で全日行を生成し、約7割の日にNPO取引を自動填充します。残高と合計は自動連動。</p>

      <div class="group"><label data-ja="お名前（カナ）" data-zh="姓名（片假名）">お名前（カナ）</label><input id="f-name" type="text" value="トクテイヒエイリカツドウホウジン　モリオカマチナミジュク" /></div>
      <div class="row-2 group">
        <div><label data-ja="店番" data-zh="支行号">店番</label><input id="f-branch-no" type="text" value="481" /></div>
        <div><label data-ja="店名" data-zh="支行名">店名</label><input id="f-branch-name" type="text" value="盛岡支店" /></div>
      </div>
      <div class="row-2 group">
        <div>
          <label data-ja="科目" data-zh="账户类型">科目</label>
          <select id="f-account-type"><option>普通</option><option>当座</option></select>
        </div>
        <div><label data-ja="口座番号" data-zh="账户号码">口座番号</label><input id="f-account-no" type="text" value="1234567" /></div>
      </div>
      <div class="row-2 group">
        <div><label data-ja="照会開始日" data-zh="查询开始日期">照会開始日</label><input id="f-period-start" class="date-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="2023-12-01" value="2023-12-06" /></div>
        <div><label data-ja="照会終了日" data-zh="查询结束日期">照会終了日</label><input id="f-period-end" class="date-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="2024-04-01" value="2024-03-05" /></div>
      </div>
      <div class="group"><label data-ja="絞り込み" data-zh="筛选">絞り込み</label><input id="f-filter" type="text" value="全取引" /></div>
      <div class="row-2 group">
        <div><label data-ja="Eco通帳申込日" data-zh="Eco通帐申请日">Eco通帳申込日</label><input id="f-eco-date" class="date-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="2023-11-07" value="2023-11-07" /></div>
        <div><label data-ja="銀行コード" data-zh="银行代码">銀行コード</label><input id="f-bank-code" type="text" value="0005" /></div>
      </div>
      <div class="row-2 group">
        <div><label data-ja="表示日" data-zh="显示日期">表示日</label><input id="f-now-date" class="date-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="2024-03-05" value="2024-03-05" /></div>
        <div><label data-ja="表示時刻" data-zh="显示时刻">表示時刻</label><input id="f-now-time" type="time" value="12:20" /></div>
      </div>
      <div class="row-2 group">
        <div><label data-ja="印刷日" data-zh="打印日期">印刷日</label><input id="f-print-date" class="date-input" type="text" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="2024-03-05" value="2024-03-05" /></div>
        <div><label data-ja="印刷時刻" data-zh="打印时刻">印刷時刻</label><input id="f-print-time" type="time" value="12:21" /></div>
      </div>
      <div class="row-2 group">
        <div><label data-ja="ページ番号（空欄=自動）" data-zh="页码（留空=自动）">ページ番号（空欄=自動）</label><input id="f-page-num" type="number" min="1" placeholder="如 4" /></div>
        <div><label data-ja="総ページ数（空欄=自動）" data-zh="总页数（留空=自动）">総ページ数（空欄=自動）</label><input id="f-page-total" type="number" min="1" placeholder="如 5" /></div>
      </div>
      <div class="group"><label data-ja="フッター URL" data-zh="页脚 URL">フッター URL</label><input id="f-url" type="text" value="https://direct11.bk.mufg.jp/ib/dfw/APL/bnkib/banking" /></div>
      <div class="group"><label data-ja="お預り金額合計" data-zh="收款金额合计">お預り金額合計</label><input id="f-total-deposit" type="text" value="128540" /></div>
      <div class="group"><label data-ja="Copyright 年" data-zh="版权年份">Copyright 年</label><input id="f-copyright-year" type="text" value="2024" /></div>
      <div class="group"><label data-ja="1ページ行数（第1ページ）" data-zh="每页行数（第1页）">1ページ行数（第1ページ）</label><input id="f-rows-per-page" type="number" min="8" max="24" value="18" /></div>


      <h2 style="font-size:13px;margin:14px 0 6px;" data-ja="取引明細" data-zh="交易明细">取引明細</h2>
      <div id="tx-list"></div>
      <button type="button" id="btn-add-row" data-ja="+ 行追加" data-zh="+ 添加行">+ 行追加</button>

      <div class="actions">
        <button type="button" class="primary" id="btn-print" data-ja="印刷" data-zh="打印">印刷</button>
        <button type="button" id="btn-save-pdf" data-ja="PDF保存" data-zh="保存 PDF">PDF保存</button>
        <button type="button" id="btn-save" data-ja="保存データ書出" data-zh="导出编辑数据">保存データ書出</button>
        <button type="button" id="btn-load" data-ja="読込" data-zh="读取">読込</button>
        <button type="button" id="btn-reset" data-ja="リセット" data-zh="重置">リセット</button>
      </div>
      <div id="save-status" style="margin-top:8px;font-size:12px;color:#666;"></div>
    </aside>

    <main class="preview-wrap" id="preview"></main>
  </div>

  <script>
    const STORAGE_KEY = "mufg-statement-template-v8-dense-tx";


    const defaultRows = [
      { date:"2023-12-08", pay:"", dep:"50000", desc:"振込１　キフキン", bal:"50000", memo:"寄付金受領" },
      { date:"2023-12-12", pay:"", dep:"30000", desc:"振込１　カイヒ", bal:"80000", memo:"会費収入" },
      { date:"2023-12-15", pay:"12000", dep:"", desc:"振込ＩＢ２　チラシインサツ", bal:"68000", memo:"広報資料・チラシ印刷費" },
      { date:"2023-12-20", pay:"", dep:"25000", desc:"振込１　イベントサンカヒ", bal:"93000", memo:"イベント参加費収入" },
      { date:"2023-12-22", pay:"18000", dep:"", desc:"振込ＩＢ２　マチヤホゾン", bal:"75000", memo:"盛岡町家保存活動費" },
      { date:"2023-12-27", pay:"330", dep:"", desc:"手数料", bal:"74670", memo:"振込手数料" },
      { date:"2024-01-05", pay:"", dep:"40000", desc:"振込１　キフキン", bal:"114670", memo:"寄付金受領" },
      { date:"2024-01-09", pay:"8500", dep:"", desc:"カ－ド　コウツウヒ", bal:"106170", memo:"ボランティア交通費" },
      { date:"2024-01-12", pay:"22000", dep:"", desc:"振込ＩＢ２　チイキコウリュウ", bal:"84170", memo:"地域交流イベント運営費" },
      { date:"2024-01-18", pay:"", dep:"20000", desc:"振込１　カイヒ", bal:"104170", memo:"会費収入" },
      { date:"2024-01-22", pay:"15000", dep:"", desc:"振込ＩＢ２　シセツイジ", bal:"89170", memo:"施設維持管理費" },
      { date:"2024-01-28", pay:"9800", dep:"", desc:"カ－ド　ウエブサイト", bal:"79370", memo:"ウェブサイト維持管理費" },
      { date:"2024-02-02", pay:"", dep:"35000", desc:"振込１　イベントサンカヒ", bal:"114370", memo:"イベント参加費収入" },
      { date:"2024-02-08", pay:"28000", dep:"", desc:"振込ＩＢ２　レキシテキマチナミ", bal:"86370", memo:"歴史的まち並み保全活動費" },
      { date:"2024-02-14", pay:"6500", dep:"", desc:"カ－ド　コウツウヒ", bal:"79870", memo:"ボランティア交通費" },
      { date:"2024-02-20", pay:"", dep:"45000", desc:"振込１　キフキン", bal:"124870", memo:"寄付金受領" },
      { date:"2024-02-26", pay:"11000", dep:"", desc:"振込ＩＢ２　チラシインサツ", bal:"113870", memo:"広報資料・チラシ印刷費" },
      { date:"2024-03-01", pay:"330", dep:"", desc:"手数料", bal:"113540", memo:"銀行手数料" },
      { date:"2024-03-04", pay:"", dep:"15000", desc:"振込１　カイヒ", bal:"128540", memo:"会費収入" },
    ];

    let rows = structuredClone(defaultRows);
    const fields = [
      "f-name","f-branch-no","f-branch-name","f-account-type","f-account-no",
      "f-period-start","f-period-end","f-filter","f-eco-date","f-bank-code","f-now-date",
      "f-now-time","f-print-date","f-print-time","f-page-num","f-page-total",
      "f-url","f-total-deposit",
      "f-copyright-year","f-rows-per-page"
    ];

    const todayISO = () => {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
    };

    const formatJPDate = (iso) => {
      if (!iso) return "";
      const [y,m,d] = iso.split("-").map(Number);
      return `${y}年${m}月${d}日`;
    };

    const formatJPDateLines = (iso) => {
      if (!iso) return { y:"", md:"" };
      const [y,m,d] = iso.split("-").map(Number);
      return { y:`${y}年`, md:`${m}月${d}日` };
    };

    const formatYen = (value) => {
      if (value === null || value === undefined || String(value).trim() === "") return "";
      const num = Number(String(value).replace(/,/g, ""));
      if (Number.isNaN(num)) return String(value);
      return `${num.toLocaleString("ja-JP")}円`;
    };



    const escapeHtml = (value) => String(value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");

    const formatTableAmount = (value, digitClassName, yenClassName) => {
      if (value === null || value === undefined || String(value).trim() === "") return "";
      const num = Number(String(value).replace(/,/g, ""));
      if (Number.isNaN(num)) return escapeHtml(value);
      return `<span class="${digitClassName}">${num.toLocaleString("ja-JP")}</span><span class="${yenClassName}">円</span>`;
    };

    const getFormData = () => {
      const data = {};
      fields.forEach(id => {
        const fieldElement = document.getElementById(id);
        if (fieldElement) data[id] = fieldElement.value;
      });
      data.rows = structuredClone(rows);
      return data;
    };

    const setFormData = (data) => {
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (el && data[id] !== undefined) el.value = data[id];
      });
      rows = structuredClone(data.rows || defaultRows);
    };

    const chunk = (arr, size) => {
      const out = [];
      for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
      return out.length ? out : [[]];
    };

    const renderHeader = (d) => {
      const nowDate = formatJPDate(d["f-now-date"]);
      const nowTime = (d["f-now-time"] || "12:20").slice(0,5).replace(":","時") + "分";
      return `
        <div class="doc-top font-w3">
          <img class="brand-img" src="assets/mufg-header.png" alt="MUFG 三菱UFJ銀行" />
          <hr class="top-rule" />
          <div class="info-card">
            <div class="bank-block">
              <div class="bank-lbl font-w6">
                <span>金融機関コード</span>
                <span class="bank-lbl-sub">（銀行コード）</span>
              </div>
              <div class="bank-val font-w3">${d["f-bank-code"] || "0005"}</div>
            </div>
            <div class="info-rows">
              <div class="info-row"><span class="lbl font-w6">お名前（カナ）</span><span class="val font-w3">${d["f-name"]}</span></div>
              <div class="info-row"><span class="lbl font-w6">店番／店名</span><span class="val font-w3">店番${d["f-branch-no"]}　${d["f-branch-name"]}</span></div>
              <div class="info-row"><span class="lbl font-w6">科目／口座番号</span><span class="val font-w3">${d["f-account-type"]} ${d["f-account-no"]}</span></div>
              <div class="info-row"><span class="lbl font-w6">照会期間</span><span class="val font-w3">${formatJPDate(d["f-period-start"])}～${formatJPDate(d["f-period-end"])}</span></div>
              <div class="info-row"><span class="lbl font-w6">絞り込み</span><span class="val font-w3">${d["f-filter"]}</span></div>
              <div class="info-row"><span class="lbl font-w6">Eco通帳申込日</span><span class="val font-w3">${formatJPDate(d["f-eco-date"])}</span></div>
            </div>
          </div>
          <div class="status-line font-w3">Eco通帳（インターネット通帳）${nowDate} ${nowTime}現在</div>
        </div>
      `;
    };

    const renderBottom = (d) => {
      const year = d["f-copyright-year"] || "2024";
      return `
        <div class="doc-bottom">
          <div class="summary-card">
            <div class="summary-left font-w6 text-96">${d["f-branch-name"]}　${d["f-account-type"]} ${d["f-account-no"]}</div>
            <div class="summary-center font-w3 text-96">お預り金額合計：</div>
            <div class="summary-amount font-amount text-96">${formatYen(d["f-total-deposit"])}</div>
          </div>
          <div class="legal font-w3 text-96">
            通帳コピー（入出金明細）が必要な場合は、この画面を印刷してご利用ください。<br>
            不要な部分はお手数ですが、黒塗りをお願いいたします。
          </div>
          <div class="copyright-bar font-w3 text-96">Copyright(c) ${year} MUFG Bank, Ltd. All rights reserved.</div>
        </div>
      `;
    };

    const renderTableHead = () => `
      <thead class="font-w6"><tr>
        <th class="col-date">日付</th>
        <th class="col-pay">お支払い</th>
        <th class="col-dep">お預かり</th>
        <th class="col-desc">お取引内容</th>
        <th class="col-bal">差引残高</th>
        <th class="col-memo">メモ</th>
      </tr></thead>
    `;

    const renderRows = (pageRows) => pageRows.map(row => {
      const date = formatJPDateLines(row.date);
      return `<tr>
        <td class="col-date date-cell"><span class="date-y">${date.y}</span><span class="date-md">${date.md}</span></td>
        <td class="col-pay num">${formatTableAmount(row.pay, "amount-digits-strong", "amount-yen-strong")}</td>
        <td class="col-dep num">${formatTableAmount(row.dep, "amount-digits-strong", "amount-yen-strong")}</td>
        <td class="col-desc">${row.desc || ""}</td>
        <td class="col-bal num">${formatTableAmount(row.bal, "amount-digits-balance", "amount-yen-balance")}</td>
        <td class="col-memo">${row.memo || ""}</td>
      </tr>`;
    }).join("");

    const renderTxEditors = () => {
      const list = document.getElementById("tx-list");
      list.innerHTML = rows.map((row, idx) => `
        <div class="tx-editor" data-idx="${idx}">
          <div class="row-2">
            <div><div class="mini-label" data-ja="日付" data-zh="日期">日付</div><input type="text" class="date-input" inputmode="numeric" autocomplete="off" spellcheck="false" placeholder="2024-01-02" data-key="date" value="${row.date||""}" /></div>
            <div><div class="mini-label" data-ja="差引残高" data-zh="账户余额">差引残高</div><input type="text" data-key="bal" value="${row.bal||""}" /></div>
          </div>
          <div class="row-3">
            <div><div class="mini-label" data-ja="お支払い" data-zh="支出">お支払い</div><input type="text" data-key="pay" value="${row.pay||""}" /></div>
            <div><div class="mini-label" data-ja="お預かり" data-zh="收入">お預かり</div><input type="text" data-key="dep" value="${row.dep||""}" /></div>
            <div><div class="mini-label" data-ja="メモ" data-zh="备注">メモ</div><input type="text" data-key="memo" value="${row.memo||""}" /></div>
          </div>
          <div><div class="mini-label" data-ja="お取引内容" data-zh="交易内容">お取引内容</div><input type="text" data-key="desc" value="${row.desc||""}" /></div>
          <div class="tx-actions">
            <button type="button" data-action="up">↑</button>
            <button type="button" data-action="down">↓</button>
            <button type="button" data-action="delete" data-ja="削除" data-zh="删除">削除</button>
          </div>
        </div>
      `).join("");

      list.querySelectorAll(".tx-editor").forEach(editor => {
        const idx = Number(editor.dataset.idx);
        editor.querySelectorAll("input").forEach(input => {
          input.addEventListener("input", () => {
            rows[idx][input.dataset.key] = input.value;
            // Keep running balances consistent after manual edits.
            let runningBalance = 0;
            rows = rows.map((row) => {
              const payNum = Number(String(row.pay || "").replace(/,/g, "")) || 0;
              const depNum = Number(String(row.dep || "").replace(/,/g, "")) || 0;
              runningBalance = runningBalance + depNum - payNum;
              return { ...row, bal: String(runningBalance) };
            });
            syncTotalDepositFromRows();
            renderPreview();
          });
        });
        editor.querySelectorAll("button").forEach(btn => {
          btn.addEventListener("click", () => {
            const a = btn.dataset.action;
            if (a === "delete") rows.splice(idx, 1);
            if (a === "up" && idx > 0) [rows[idx-1], rows[idx]] = [rows[idx], rows[idx-1]];
            if (a === "down" && idx < rows.length-1) [rows[idx+1], rows[idx]] = [rows[idx], rows[idx+1]];
            renderTxEditors(); renderPreview();
          });
        });
      });
      applyPanelLanguage(currentPanelLang);
    };

    const renderPreview = () => {
      const d = getFormData();
      // First page has header so fewer rows than continuation pages.
      // Default 18 fills the first sheet better; continuation pages use more rows.
      const firstPageRows = Math.max(8, Math.min(24, Number(d["f-rows-per-page"]) || 18));
      const otherPageRows = 28;
      const pages = [];
      if (rows.length === 0) {
        pages.push([]);
      } else {
        pages.push(rows.slice(0, firstPageRows));
        let i = firstPageRows;
        while (i < rows.length) {
          pages.push(rows.slice(i, i + otherPageRows));
          i += otherPageRows;
        }
      }

      const printDate = (d["f-print-date"] || todayISO()).replaceAll("-", "/");
      const printTime = (d["f-print-time"] || "12:21").slice(0,5);
      const totalPages = pages.length;

      document.getElementById("preview").innerHTML = pages.map((pageRows, pageIdx) => {
        const isFirst = pageIdx === 0;
        const isLast = pageIdx === totalPages - 1;
        const displayRows = pageRows;
        const header = isFirst ? renderHeader(d) : "";
        // Keep table header on every page for readability and stable layout.
        const tableHead = renderTableHead();
        const summary = isLast ? renderBottom(d) : "";
        const pageNum = d["f-page-num"] ? Number(d["f-page-num"]) : pageIdx + 1;
        const pageTotal = d["f-page-total"] ? Number(d["f-page-total"]) : totalPages;

        return `<section class="sheet">
          <div class="sheet-body">
            ${header}
            <table class="tx-table font-w3">${tableHead}<tbody>${renderRows(displayRows)}</tbody></table>
            ${summary}
          </div>
          <div class="footer">
            <span class="footer-url font-footer-url">${d["f-url"]}</span>
            <span class="footer-meta font-footer-url">
              <span class="footer-time">${printTime} ${printDate}</span>
              <span class="footer-page">${pageNum} / ${pageTotal}</span>
            </span>
          </div>
        </section>`;
      }).join("");
    };


    const TRANSACTION_TEMPLATES = [
      { memo: "寄付金受領", desc: "振込１　キフキン", kind: "dep", min: 10000, max: 80000, step: 1000 },
      { memo: "会費収入", desc: "振込１　カイヒ", kind: "dep", min: 5000, max: 40000, step: 1000 },
      { memo: "イベント参加費収入", desc: "振込１　イベントサンカヒ", kind: "dep", min: 8000, max: 50000, step: 1000 },
      { memo: "盛岡町家保存活動費", desc: "振込ＩＢ２　マチヤホゾン", kind: "pay", min: 5000, max: 35000, step: 500 },
      { memo: "歴史的まち並み保全活動費", desc: "振込ＩＢ２　レキシテキマチナミ", kind: "pay", min: 8000, max: 40000, step: 500 },
      { memo: "地域交流イベント運営費", desc: "振込ＩＢ２　チイキコウリュウ", kind: "pay", min: 6000, max: 30000, step: 500 },
      { memo: "広報資料・チラシ印刷費", desc: "振込ＩＢ２　チラシインサツ", kind: "pay", min: 3000, max: 18000, step: 500 },
      { memo: "施設維持管理費", desc: "振込ＩＢ２　シセツイジ", kind: "pay", min: 4000, max: 25000, step: 500 },
      { memo: "ボランティア交通費", desc: "カ－ド　コウツウヒ", kind: "pay", min: 1000, max: 12000, step: 100 },
      { memo: "ウェブサイト維持管理費", desc: "カ－ド　ウエブサイト", kind: "pay", min: 2000, max: 15000, step: 100 },
      { memo: "振込手数料", desc: "手数料", kind: "pay", min: 110, max: 880, step: 110 },
      { memo: "銀行手数料", desc: "手数料", kind: "pay", min: 110, max: 660, step: 110 },
    ];

    const randomIntInclusive = (min, max) => Math.floor(Math.random() * (max - min + 1)) + min;

    const randomAmount = (min, max, step) => {
      const steps = Math.floor((max - min) / step);
      return min + randomIntInclusive(0, Math.max(0, steps)) * step;
    };

    const pickTransactionTemplate = () => TRANSACTION_TEMPLATES[randomIntInclusive(0, TRANSACTION_TEMPLATES.length - 1)];

    const syncTotalDepositFromRows = () => {
      if (!rows.length) {
        const totalField = document.getElementById("f-total-deposit");
        if (totalField) totalField.value = "0";
        return 0;
      }
      const lastBalance = Number(String(rows[rows.length - 1].bal || "").replace(/,/g, "")) || 0;
      const totalField = document.getElementById("f-total-deposit");
      if (totalField) totalField.value = String(lastBalance);
      return lastBalance;
    };

    const regenerateRowsForPeriod = (opts) => {
      const silent = !!(opts && opts.silent);
      const forceRandom = !!(opts && opts.forceRandom);
      const fillRatio = typeof (opts && opts.fillRatio) === "number" ? opts.fillRatio : 0.72;
      const startDateValue = (document.getElementById("f-period-start") || {}).value || "";
      const endDateValue = (document.getElementById("f-period-end") || {}).value || "";
      const startDateParts = String(startDateValue).trim().split("-").map(Number);
      const endDateParts = String(endDateValue).trim().split("-").map(Number);
      if (startDateParts.length !== 3 || endDateParts.length !== 3) return false;
      if (startDateParts.some((n) => Number.isNaN(n)) || endDateParts.some((n) => Number.isNaN(n))) return false;

      const startDate = new Date(startDateParts[0], startDateParts[1] - 1, startDateParts[2]);
      const endDate = new Date(endDateParts[0], endDateParts[1] - 1, endDateParts[2]);
      if (Number.isNaN(startDate.getTime()) || Number.isNaN(endDate.getTime())) return false;
      if (startDate > endDate) return false;

      const dayCount = Math.floor((endDate - startDate) / 86400000) + 1;
      if (dayCount > 400) return false;

      const isoFor = (date) => `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      const existingRowsByDate = {};
      (rows || []).forEach((row) => {
        if (row && row.date) existingRowsByDate[row.date] = row;
      });

      const generatedRows = [];
      const cursorDate = new Date(startDate.getTime());
      let runningBalance = 0;

      while (cursorDate <= endDate) {
        const isoDate = isoFor(cursorDate);
        const existingRow = existingRowsByDate[isoDate];
        let pay = "";
        let dep = "";
        let desc = "";
        let memo = "";

        const hasExistingTxn = existingRow && (
          String(existingRow.pay || "").trim() !== "" ||
          String(existingRow.dep || "").trim() !== "" ||
          String(existingRow.desc || "").trim() !== "" ||
          String(existingRow.memo || "").trim() !== ""
        );

        if (hasExistingTxn && !forceRandom) {
          pay = existingRow.pay || "";
          dep = existingRow.dep || "";
          desc = existingRow.desc || "";
          memo = existingRow.memo || "";
        } else if (Math.random() < fillRatio) {
          // Fill roughly 7 of 10 days with random category content.
          const template = pickTransactionTemplate();
          const amount = randomAmount(template.min, template.max, template.step);
          if (template.kind === "dep") {
            dep = String(amount);
          } else {
            // Avoid overdraft for expense rows.
            const maxPayable = Math.max(0, runningBalance);
            if (maxPayable < template.min) {
              // Not enough balance for expense: switch to a donation/income row.
              const incomeTemplates = TRANSACTION_TEMPLATES.filter((item) => item.kind === "dep");
              const incomeTemplate = incomeTemplates[randomIntInclusive(0, incomeTemplates.length - 1)];
              dep = String(randomAmount(incomeTemplate.min, incomeTemplate.max, incomeTemplate.step));
              desc = incomeTemplate.desc;
              memo = incomeTemplate.memo;
            } else {
              const payable = Math.min(amount, maxPayable);
              const stepped = Math.max(template.min, Math.floor(payable / template.step) * template.step);
              pay = String(Math.max(template.min, stepped));
              desc = template.desc;
              memo = template.memo;
            }
          }
          if (!desc) {
            desc = template.desc;
            memo = template.memo;
          }
        }

        const payNum = Number(String(pay || "").replace(/,/g, "")) || 0;
        const depNum = Number(String(dep || "").replace(/,/g, "")) || 0;
        runningBalance = runningBalance + depNum - payNum;

        generatedRows.push({
          date: isoDate,
          pay,
          dep,
          desc,
          bal: String(runningBalance),
          memo,
        });

        cursorDate.setDate(cursorDate.getDate() + 1);
      }

      rows = generatedRows;
      syncTotalDepositFromRows();
      if (!silent) {
        renderTxEditors();
        renderPreview();
      }
      return true;
    };



    fields.forEach(id => {
      const fieldElement = document.getElementById(id);
      if (!fieldElement) return;
      fieldElement.addEventListener("input", renderPreview);
      fieldElement.addEventListener("change", renderPreview);
    });

    document.getElementById("f-now-date").value = "2024-03-05";
    document.getElementById("f-print-date").value = "2024-03-05";


    const buildPdfFileName = () => {
      const dateText = (document.getElementById("f-print-date")?.value || todayISO()).replaceAll("-", "");
      return `mufg-statement-${dateText}.pdf`;
    };

    const downloadPreviewPdf = async () => {
      const html2canvasInstance = window.html2canvas;
      const jsPDFClass = window.jspdf && window.jspdf.jsPDF;
      if (!html2canvasInstance || !jsPDFClass) {
        throw new Error(currentPanelLang === "zh" ? "PDF 生成库尚未加载完成，请稍后再试" : "PDF生成ライブラリの読み込みが完了していません。少し待ってから再試行してください");
      }

      renderPreview();
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      if (document.fonts && document.fonts.ready) await document.fonts.ready;

      const sheets = Array.from(document.querySelectorAll(".sheet"));
      if (!sheets.length) {
        throw new Error(currentPanelLang === "zh" ? "没有可导出的预览页面" : "書き出すプレビューページがありません");
      }

      // Capture each sheet at fixed A4-like size, one image per PDF page.
      const pdf = new jsPDFClass({ orientation: "portrait", unit: "mm", format: "a4" });
      const pageWidth = pdf.internal.pageSize.getWidth();
      const pageHeight = pdf.internal.pageSize.getHeight();

      for (const [sheetIndex, sheetElement] of sheets.entries()) {
        if (sheetIndex > 0) pdf.addPage();

        const originalStyles = {
          boxShadow: sheetElement.style.boxShadow,
          margin: sheetElement.style.margin,
          width: sheetElement.style.width,
          minHeight: sheetElement.style.minHeight,
          height: sheetElement.style.height,
          overflow: sheetElement.style.overflow,
        };

        sheetElement.style.boxShadow = "none";
        sheetElement.style.margin = "0";
        sheetElement.style.width = "190mm";
        sheetElement.style.minHeight = "277mm";
        sheetElement.style.height = "277mm";
        sheetElement.style.overflow = "hidden";

        const canvas = await html2canvasInstance(sheetElement, {
          backgroundColor: "#ffffff",
          scale: 2,
          useCORS: true,
          logging: false,
          width: sheetElement.offsetWidth,
          height: sheetElement.offsetHeight,
          windowWidth: sheetElement.offsetWidth,
          windowHeight: sheetElement.offsetHeight,
        });

        sheetElement.style.boxShadow = originalStyles.boxShadow;
        sheetElement.style.margin = originalStyles.margin;
        sheetElement.style.width = originalStyles.width;
        sheetElement.style.minHeight = originalStyles.minHeight;
        sheetElement.style.height = originalStyles.height;
        sheetElement.style.overflow = originalStyles.overflow;

        // Always fit one sheet into exactly one A4 page to avoid multi-page bleed/overlap.
        const imageData = canvas.toDataURL("image/jpeg", 0.98);
        pdf.addImage(imageData, "JPEG", 0, 0, pageWidth, pageHeight);
      }

      pdf.save(buildPdfFileName());
    };

    document.getElementById("btn-add-row").addEventListener("click", () => {
      rows.push({ date: todayISO(), pay:"", dep:"", desc:"", bal:"", memo:"" });
      renderTxEditors(); renderPreview();
    });
    document.getElementById("btn-print").addEventListener("click", () => window.print());
    document.getElementById("btn-save-pdf").addEventListener("click", async () => {
      try {
        setSaveStatus(currentPanelLang === "zh" ? "正在生成 PDF..." : "PDFを生成しています...");
        await downloadPreviewPdf();
        setSaveStatus(currentPanelLang === "zh" ? "PDF 已保存" : "PDFを保存しました");
      } catch (error) {
        const messagePrefix = currentPanelLang === "zh" ? "PDF保存失败：" : "PDF保存に失敗しました：";
        setSaveStatus(messagePrefix + error.message, true);
        alert(messagePrefix + error.message);
      }
    });
    const setSaveStatus = (message, isError = false) => {
      const saveStatusElement = document.getElementById("save-status");
      if (!saveStatusElement) return;
      saveStatusElement.textContent = message;
      saveStatusElement.style.color = isError ? "#c00" : "#067d17";
    };

    const buildSavedFileName = () => {
      const dateText = (document.getElementById("f-print-date")?.value || todayISO()).replaceAll("-", "");
      return `mufg-statement-template-${dateText}.json`;
    };

    document.getElementById("btn-save").addEventListener("click", () => {
      try {
        const savedData = getFormData();
        const serializedData = JSON.stringify(savedData, null, 2);
        const dataBlob = new Blob([serializedData], { type: "application/json;charset=utf-8" });
        const downloadUrl = URL.createObjectURL(dataBlob);
        const downloadLink = document.createElement("a");
        downloadLink.href = downloadUrl;
        downloadLink.download = buildSavedFileName();
        document.body.appendChild(downloadLink);
        downloadLink.click();
        downloadLink.remove();
        URL.revokeObjectURL(downloadUrl);

        localStorage.setItem(STORAGE_KEY, JSON.stringify(savedData));
        setSaveStatus(currentPanelLang === "zh" ? "已导出保存文件" : "保存ファイルを書き出しました");
      } catch (error) {
        const messagePrefix = currentPanelLang === "zh" ? "保存失败：" : "保存に失敗しました：";
        setSaveStatus(messagePrefix + error.message, true);
        alert(messagePrefix + error.message);
      }
    });

    document.getElementById("btn-load").addEventListener("click", () => {
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = "application/json,.json";
      fileInput.addEventListener("change", () => {
        const selectedFile = fileInput.files && fileInput.files[0];
        if (!selectedFile) return;

        const fileReader = new FileReader();
        fileReader.addEventListener("load", () => {
          try {
            const loadedData = JSON.parse(String(fileReader.result || "{}"));
            setFormData(loadedData);
            renderTxEditors();
            renderPreview();
            applyPanelLanguage(currentPanelLang);
            localStorage.setItem(STORAGE_KEY, JSON.stringify(getFormData()));
            setSaveStatus(currentPanelLang === "zh" ? "已读取保存文件" : "保存ファイルを読み込みました");
          } catch (error) {
            const messagePrefix = currentPanelLang === "zh" ? "读取失败：" : "読み込みに失敗しました：";
            setSaveStatus(messagePrefix + error.message, true);
            alert(messagePrefix + error.message);
          }
        });
        fileReader.readAsText(selectedFile, "utf-8");
      });
      fileInput.click();
    });
    document.getElementById("btn-reset").addEventListener("click", () => {
      if (!confirm("初期値に戻しますか？")) return;
      rows = structuredClone(defaultRows);
      fields.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;
        if (el.tagName === "SELECT") el.selectedIndex = 0;
        else el.value = el.defaultValue;
      });
      document.getElementById("f-now-date").value = "2024-03-05";
      document.getElementById("f-print-date").value = "2024-03-05";
      regenerateRowsForPeriod({ silent: true, forceRandom: true });
      renderTxEditors();
      renderPreview();
    });



    const bindPeriodRegeneration = () => {
      const periodStartField = document.getElementById("f-period-start");
      const periodEndField = document.getElementById("f-period-end");
      if (!periodStartField || !periodEndField) return;
      const triggerRegenerate = () => {
        try {
          regenerateRowsForPeriod();
        } catch (error) {
          console.error(error);
        }
      };
      periodStartField.addEventListener("change", triggerRegenerate);
      periodEndField.addEventListener("change", triggerRegenerate);
      // Also regenerate when user finishes typing a full ISO date.
      periodStartField.addEventListener("blur", triggerRegenerate);
      periodEndField.addEventListener("blur", triggerRegenerate);
    };

    let currentPanelLang = "ja";
    const applyPanelLanguage = (lang) => {
      currentPanelLang = lang;
      document.documentElement.setAttribute("lang", lang);
      document.querySelectorAll("[data-ja][data-zh]").forEach(element => {
        element.textContent = element.dataset[lang] || element.dataset.ja || "";
      });
      document.querySelectorAll("#lang-toggle button").forEach(button => {
        button.classList.toggle("active", button.dataset.lang === lang);
      });
      try { localStorage.setItem("mufg-lang", lang); } catch (error) {}
    };
    document.querySelectorAll("#lang-toggle button").forEach(button => {
      button.addEventListener("click", () => applyPanelLanguage(button.dataset.lang));
    });
    try {
      const savedLang = localStorage.getItem("mufg-lang");
      if (savedLang === "zh" || savedLang === "ja") currentPanelLang = savedLang;
    } catch (error) {}
    try { bindPeriodRegeneration(); } catch (error) { console.error(error); }
    try { regenerateRowsForPeriod({ silent: true, forceRandom: true }); } catch (error) { console.error(error); }
    renderTxEditors();
    renderPreview();
    applyPanelLanguage(currentPanelLang);

  </script>
</body>
</html>
