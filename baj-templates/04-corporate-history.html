<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>履歴事項全部証明書 編集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@500;600;700&amp;display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: #d8d8d8;
      color: #111;
      font-size: 12px;
    }
    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }
    .panel {
      background: #fff;
      border-right: 1px solid #ccc;
      padding: 14px;
      overflow: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .panel h1 { font-size: 15px; margin: 0 0 6px; }
    .hint { font-size: 11px; color: #666; line-height: 1.45; margin: 0 0 12px; }
    .back { display: inline-block; margin-bottom: 10px; font-size: 12px; color: #06c; }
    .group { margin-bottom: 8px; }
    .group label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 3px; }
    .group input, .group textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #bbb;
      border-radius: 3px;
      font: inherit;
      font-size: 12px;
    }
    .group textarea { min-height: 90px; resize: vertical; line-height: 1.4; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    button {
      border: 1px solid #aaa;
      background: #fff;
      padding: 7px 10px;
      border-radius: 3px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }
    button.primary { background: #0a66c2; color: #fff; border-color: #0a66c2; }
    .status { margin-top: 8px; font-size: 12px; color: #067d17; min-height: 18px; }
    .preview-wrap { padding: 20px; overflow: auto; }
    .sheet {
      position: relative;
      width: 190mm;
      max-width: none;
      margin: 0 auto 20px;
      background: #fff;
      box-shadow: 0 1px 8px rgba(0,0,0,.15);
      overflow: hidden;
    }
    .sheet img.bg {
      display: block;
      width: 100%;
      height: auto;
      user-select: none;
      pointer-events: none;
    }
    .sheet img.seal {
      position: absolute;
      z-index: 5;
      pointer-events: none;
      user-select: none;
      object-fit: contain;
      opacity: 0.92;
    }
    .field {
      position: absolute;
      border: 1px dashed transparent;
      background: transparent;
      color: #111;
      margin: 0;
      padding: 0 3px;
      outline: none;
      overflow: hidden;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.22;
      font-family: "Noto Sans JP", "Yu Gothic", sans-serif;
      font-size: 14.5px;
      font-weight: 700;
    }
    .field:hover, .field:focus {
      border-color: rgba(10,102,194,.55);
      background: rgba(255,255,255,.35);
    }
    .field.center { text-align: center; }
    .field.corp-no {
      font-family: "Noto Sans JP", Arial, sans-serif;
      font-size: 20px;
      font-weight: 500;
      letter-spacing: 0;
      display: flex;
      align-items: center;
    }
    .field.header {
      text-align: left;
      font-size: 14.5px;
      font-weight: 700;
      line-height: 1.18;
    }
    .field.purpose {
      font-size: 12.5px;
      font-weight: 700;
      line-height: 1.22;
    }
    .field.officers {
      font-size: 13.5px;
      font-weight: 700;
      line-height: 1.22;
    }
    .field.cert-note {
      font-size: 10.5px;
      font-weight: 700;
      line-height: 1.2;
    }
    .field.registry {
      font-size: 11.5px;
      font-weight: 700;
    }
    .field.issuer {
      text-align: right;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.15em;
    }
    .field.serial, .field.page {
      font-size: 11.5px;
      font-weight: 700;
    }
    .field.page { text-align: right; }

    @media print {
      body { background: #fff; }
      .panel { display: none !important; }
      .preview-wrap { padding: 0; }
      .sheet { box-shadow: none; margin: 0; width: 190mm; }
      .field { border-color: transparent !important; background: transparent !important; }
    }
    @media (max-width: 1000px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: static; height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <a class="back" href="./index.html">← 模板列表</a>
      <h1>履歴事項全部証明書</h1>
      <p class="hint">底版已清除可变文字，保留标题/表格线/栏目名/菊纹，并叠印两个红色法務局印章。左侧改字段，右侧实时预览。</p>

      <div class="group"><label>所在地（标题下）</label><input id="f-header-addr" /></div>
      <div class="group"><label>法人名（标题下）</label><input id="f-header-org" /></div>
      <div class="group"><label>会社法人等番号</label><input id="f-corp-no" /></div>
      <div class="group"><label>名称</label><textarea id="f-name"></textarea></div>
      <div class="group"><label>主たる事務所</label><input id="f-office" /></div>
      <div class="group"><label>法人成立の年月日</label><input id="f-founded" /></div>
      <div class="group"><label>目的等</label><textarea id="f-purpose" style="min-height:150px"></textarea></div>
      <div class="group"><label>役員に関する事項</label><textarea id="f-officers" style="min-height:130px"></textarea></div>
      <div class="group"><label>証明文</label><textarea id="f-cert-note"></textarea></div>
      <div class="group"><label>証明日</label><input id="f-cert-date" /></div>
      <div class="group"><label>法務局</label><input id="f-registry" /></div>
      <div class="group"><label>登記官氏名</label><input id="f-issuer" /></div>
      <div class="group"><label>整理番号</label><input id="f-serial" /></div>
      <div class="group"><label>页码</label><input id="f-page" /></div>

      <div class="actions">
        <button type="button" class="primary" id="btn-pdf">保存 PDF</button>
        <button type="button" id="btn-print">打印</button>
        <button type="button" id="btn-save">导出JSON</button>
        <button type="button" id="btn-load">读取JSON</button>
        <button type="button" id="btn-reset">重置</button>
      </div>
      <div class="status" id="status"></div>
    </aside>

    <main class="preview-wrap">
      <section class="sheet" id="sheet">
        <img class="bg" src="./assets/page4-clean.png" alt="corporate history clean background" />

        <!-- Positions derived from page4-geometry.json (1489x2105) -->
        <div class="field header" contenteditable="true" id="ov-header-addr" data-key="header-addr"
             style="left:18.4%;top:14.5%;width:73.9%;height:2.1%"></div>
        <div class="field header" contenteditable="true" id="ov-header-org" data-key="header-org"
             style="left:18.4%;top:16.2%;width:73.9%;height:2.5%"></div>

        <div class="field corp-no" contenteditable="true" id="ov-corp-no" data-key="corp-no"
             style="left:32.4%;top:19.5%;width:60.5%;height:4.3%"></div>
        <div class="field" contenteditable="true" id="ov-name" data-key="name"
             style="left:32.4%;top:24.8%;width:60.5%;height:4.1%"></div>
        <div class="field" contenteditable="true" id="ov-office" data-key="office"
             style="left:32.4%;top:29.7%;width:60.5%;height:2.3%"></div>
        <div class="field" contenteditable="true" id="ov-founded" data-key="founded"
             style="left:32.4%;top:32.8%;width:60.5%;height:2.2%"></div>
        <div class="field purpose" contenteditable="true" id="ov-purpose" data-key="purpose"
             style="left:32.4%;top:35.8%;width:60.5%;height:25.6%"></div>
        <div class="field officers" contenteditable="true" id="ov-officers" data-key="officers"
             style="left:32.4%;top:62.4%;width:60.5%;height:17.1%"></div>

        <div class="field center cert-note" contenteditable="true" id="ov-cert-note" data-key="cert-note"
             style="left:19.7%;top:80.8%;width:71.2%;height:3.8%"></div>
        <div class="field center" contenteditable="true" id="ov-cert-date" data-key="cert-date"
             style="left:29.2%;top:84.9%;width:52.4%;height:2.1%"></div>
        <div class="field center registry" contenteditable="true" id="ov-registry" data-key="registry"
             style="left:24%;top:86.6%;width:35%;height:2.4%"></div>
        <div class="field issuer" contenteditable="true" id="ov-issuer" data-key="issuer"
             style="left:55%;top:87.8%;width:30%;height:2.8%"></div>

        <!-- Two red registry seals from reference KYC certificate -->
        <img class="seal" id="seal-left" src="./assets/seal-left.png" alt="登記印"
             style="left:53%;top:84%;width:11%;height:7.8%" />
        <img class="seal" id="seal-right" src="./assets/seal-right.png" alt="法務局印"
             style="left:81.5%;top:84.1%;width:10.9%;height:7.8%" />

        <div class="field serial" contenteditable="true" id="ov-serial" data-key="serial"
             style="left:24.5%;top:93.2%;width:13%;height:2.2%"></div>
        <div class="field page" contenteditable="true" id="ov-page" data-key="page"
             style="left:83.5%;top:93.2%;width:9%;height:2.2%"></div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "baj-corporate-history-v8-noto-sans-jp";
    const KEYS = [
      "header-addr", "header-org", "corp-no", "name", "office", "founded",
      "purpose", "officers", "cert-note", "cert-date", "registry", "issuer", "serial", "page"
    ];
    const defaults = {
      "header-addr": "東京都渋谷区本町三丁目48番21-303号",
      "header-org": "特定非営利活動法人ブリッジ・アジア・ジャパン（Bridge Asia Japan）",
      "corp-no": "5011005001003",
      name: "特定非営利活動法人ブリッジ・アジア・ジャパン\n（Bridge Asia Japan）",
      office: "東京都渋谷区本町三丁目48番21-303号",
      founded: "平成28年4月4日",
      purpose: "この法人は、アジア太平洋地域において、教育、環境、平和構築等の分野で、国界を越えた市民社会の協力と交流を推進し、持続可能で平和な社会の実現に寄与することを目的とする。\nこの法人は、上記の目的を達成するため、次の事業を行う。\n(1) 環境・平和の平和分野の国際交流事業\n(2) 国際理解教育の推進事業\n(3) 地域社会の課題解決に向けた国際協力事業\n(4) 研究・調査・広業・政策提言事業\n(5) その他、この法人の目的を達成するために必要な又は補助的活動",
      officers: "東京都渋谷区本町三丁目48番21-303号\n理事　中島 かおり\n東京都渋谷区本町三丁目48番21-303号\n理事　石川 治江\n東京都渋谷区本町三丁目48番21-303号\n理事　根本 悦子\n東京都渋谷区本町三丁目48番21-303号\n理事　Sejima Shunsuke",
      "cert-note": "これは登記簿に記録されている閉鎖されていない事項の全部であることを証明した書面である。\n（東京法務局渋谷出張所管轄）",
      "cert-date": "平成28年 4月13日",
      registry: "東京法務局渋谷出張所\n登記官",
      issuer: "岡戸 嘉信",
      serial: "T344310",
      page: "1  5"
    };

    const setStatus = (message, isError = false) => {
      const statusElement = document.getElementById("status");
      statusElement.textContent = message || "";
      statusElement.style.color = isError ? "#c00" : "#067d17";
    };

    const syncToOverlay = () => {
      KEYS.forEach((key) => {
        const inputElement = document.getElementById("f-" + key);
        const overlayElement = document.getElementById("ov-" + key);
        if (!inputElement || !overlayElement) return;
        overlayElement.textContent = inputElement.value || "";
      });
    };

    const syncFromOverlay = (key) => {
      const inputElement = document.getElementById("f-" + key);
      const overlayElement = document.getElementById("ov-" + key);
      if (!inputElement || !overlayElement) return;
      inputElement.value = overlayElement.textContent || "";
    };

    const getData = () => {
      const data = {};
      KEYS.forEach((key) => {
        const inputElement = document.getElementById("f-" + key);
        if (inputElement) data[key] = inputElement.value;
      });
      return data;
    };

    const setData = (data) => {
      KEYS.forEach((key) => {
        const inputElement = document.getElementById("f-" + key);
        if (inputElement && data[key] !== undefined) inputElement.value = data[key];
      });
      syncToOverlay();
    };

    KEYS.forEach((key) => {
      const inputElement = document.getElementById("f-" + key);
      const overlayElement = document.getElementById("ov-" + key);
      if (inputElement) {
        inputElement.addEventListener("input", syncToOverlay);
        inputElement.addEventListener("change", syncToOverlay);
      }
      if (overlayElement) {
        overlayElement.addEventListener("input", () => syncFromOverlay(key));
        overlayElement.addEventListener("blur", () => syncFromOverlay(key));
      }
    });

    document.getElementById("btn-print").addEventListener("click", () => window.print());

    document.getElementById("btn-pdf").addEventListener("click", async () => {
      try {
        setStatus("正在生成 PDF...");
        await document.fonts.ready;
        const sheetElement = document.getElementById("sheet");
        const canvas = await html2canvas(sheetElement, {
          backgroundColor: "#ffffff",
          scale: 2,
          useCORS: true
        });
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const ratio = Math.min(pageWidth / canvas.width, pageHeight / canvas.height);
        const imageWidth = canvas.width * ratio;
        const imageHeight = canvas.height * ratio;
        pdf.addImage(
          canvas.toDataURL("image/jpeg", 0.98),
          "JPEG",
          (pageWidth - imageWidth) / 2,
          0,
          imageWidth,
          imageHeight
        );
        pdf.save("corporate-history.pdf");
        setStatus("PDF 已保存");
      } catch (error) {
        setStatus("PDF失败: " + error.message, true);
        alert(error.message);
      }
    });

    document.getElementById("btn-save").addEventListener("click", () => {
      const data = getData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const anchor = document.createElement("a");
      anchor.href = URL.createObjectURL(blob);
      anchor.download = "corporate-history.json";
      anchor.click();
      URL.revokeObjectURL(anchor.href);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setStatus("JSON 已导出，并已缓存到本地");
    });

    document.getElementById("btn-load").addEventListener("click", () => {
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "application/json,.json";
      input.addEventListener("change", async () => {
        const file = input.files && input.files[0];
        if (!file) return;
        try {
          const text = await file.text();
          const data = JSON.parse(text);
          setData(data);
          localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
          setStatus("JSON 已读取");
        } catch (error) {
          setStatus("读取失败: " + error.message, true);
        }
      });
      input.click();
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      setData(defaults);
      localStorage.removeItem(STORAGE_KEY);
      setStatus("已重置为默认值");
    });

    try {
      const cached = localStorage.getItem(STORAGE_KEY);
      if (cached) setData(JSON.parse(cached));
      else setData(defaults);
    } catch (error) {
      setData(defaults);
    }

    window.addEventListener("beforeunload", () => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(getData())); } catch (error) {}
    });
  </script>
</body>
</html>
