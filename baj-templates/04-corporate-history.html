<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>履歴事項全部証明書 編集</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --line: #222;
      --muted: #555;
      --panel-bg: #fff;
      --page-bg: #d8d8d8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--page-bg);
      color: #111;
      font-size: 12px;
    }
    .app {
      display: grid;
      grid-template-columns: 340px 1fr;
      min-height: 100vh;
    }
    .panel {
      background: var(--panel-bg);
      border-right: 1px solid #ccc;
      padding: 14px;
      overflow: auto;
      position: sticky;
      top: 0;
      height: 100vh;
    }
    .panel h1 { font-size: 15px; margin: 0 0 6px; }
    .hint { font-size: 11px; color: #666; line-height: 1.45; margin: 0 0 12px; }
    .back { display: inline-block; margin-bottom: 10px; font-size: 12px; color: #06c; }
    .group { margin-bottom: 8px; }
    .group label { display: block; font-size: 11px; font-weight: 700; margin-bottom: 3px; }
    .group input, .group textarea {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #bbb;
      border-radius: 3px;
      font: inherit;
      font-size: 12px;
    }
    .group textarea { min-height: 90px; resize: vertical; line-height: 1.4; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eee;
    }
    button {
      border: 1px solid #aaa;
      background: #fff;
      padding: 7px 10px;
      border-radius: 3px;
      cursor: pointer;
      font: inherit;
      font-size: 12px;
    }
    button.primary { background: #0a66c2; color: #fff; border-color: #0a66c2; }
    .status { margin-top: 8px; font-size: 12px; color: #067d17; min-height: 18px; }
    .preview-wrap { padding: 20px; overflow: auto; }

    /* ===== Document sheet: pure HTML reconstruction ===== */
    .sheet {
      width: min(100%, 190mm);
      min-height: 277mm;
      margin: 0 auto 20px;
      background: #fff url("./assets/page4-deco.png") center / cover no-repeat;
      box-shadow: 0 1px 8px rgba(0,0,0,.15);
      padding: 14mm 12mm 12mm;
      position: relative;
      color: #111;
    }
    .sheet-inner {
      background: rgba(255,255,255,.92);
      border: 1px solid #cfcfcf;
      padding: 10mm 8mm 8mm;
      min-height: 245mm;
      position: relative;
    }
    .doc-title {
      text-align: center;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.25em;
      margin: 0 0 8px;
    }
    .doc-sub {
      text-align: center;
      font-size: 11px;
      line-height: 1.55;
      margin: 0 0 10px;
      color: #222;
    }
    .doc-sub [contenteditable="true"] {
      display: block;
      outline: none;
      min-height: 1.2em;
    }
    .doc-sub [contenteditable="true"]:hover,
    .doc-sub [contenteditable="true"]:focus {
      background: rgba(10,102,194,.08);
      box-shadow: inset 0 0 0 1px rgba(10,102,194,.25);
    }

    table.registry {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 11px;
      line-height: 1.45;
      background: #fff;
    }
    table.registry th,
    table.registry td {
      border: 1px solid var(--line);
      vertical-align: top;
      padding: 6px 8px;
    }
    table.registry th {
      width: 22%;
      background: #fafafa;
      font-weight: 700;
      text-align: center;
      white-space: nowrap;
    }
    table.registry td {
      width: 78%;
      background: #fff;
    }
    table.registry .editable {
      outline: none;
      min-height: 1.2em;
      white-space: pre-wrap;
      word-break: break-word;
    }
    table.registry .editable:hover,
    table.registry .editable:focus {
      background: rgba(10,102,194,.06);
      box-shadow: inset 0 0 0 1px rgba(10,102,194,.25);
    }
    table.registry .purpose {
      min-height: 120px;
    }
    table.registry .officers {
      min-height: 90px;
    }
    table.registry .corp-no {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .cert-block {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      line-height: 1.7;
    }
    .cert-block .editable {
      outline: none;
      display: inline-block;
      min-width: 40%;
      white-space: pre-wrap;
    }
    .cert-block .editable:hover,
    .cert-block .editable:focus {
      background: rgba(10,102,194,.06);
      box-shadow: inset 0 0 0 1px rgba(10,102,194,.25);
    }
    .cert-meta {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      font-size: 11px;
      text-align: center;
    }
    .issuer-line {
      margin-top: 14px;
      text-align: right;
      font-size: 13px;
      padding-right: 12%;
    }
    .issuer-line .editable {
      outline: none;
      display: inline-block;
      min-width: 8em;
      text-align: center;
    }
    .issuer-line .editable:hover,
    .issuer-line .editable:focus {
      background: rgba(10,102,194,.06);
      box-shadow: inset 0 0 0 1px rgba(10,102,194,.25);
    }
    .footer-line {
      margin-top: 18px;
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #333;
      border-top: 1px solid #ddd;
      padding-top: 6px;
    }
    .footer-line .editable {
      outline: none;
      min-width: 4em;
    }
    .footer-line .editable:hover,
    .footer-line .editable:focus {
      background: rgba(10,102,194,.06);
    }
    .note {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }

    @media print {
      body { background: #fff; }
      .panel { display: none !important; }
      .preview-wrap { padding: 0; }
      .sheet {
        box-shadow: none;
        margin: 0;
        width: auto;
        min-height: auto;
      }
      .sheet-inner { border-color: #bbb; }
      .editable:hover,
      .editable:focus {
        background: transparent !important;
        box-shadow: none !important;
      }
    }
    @media (max-width: 1000px) {
      .app { grid-template-columns: 1fr; }
      .panel { position: static; height: auto; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <a class="back" href="./index.html">← 模板列表</a>
      <h1>履歴事項全部証明書</h1>
      <p class="hint">方案二：表格与文字用 HTML 重绘，不再叠在原证件文字上。左侧改字段，右侧实时预览。</p>

      <div class="group"><label>所在地（标题下）</label><input id="f-header-addr" value="東京都渋谷区本町三丁目48番21-303号" /></div>
      <div class="group"><label>法人名（标题下）</label><input id="f-header-org" value="特定非営利活動法人ブリッジ・アジア・ジャパン（Bridge Asia Japan）" /></div>
      <div class="group"><label>会社法人等番号</label><input id="f-corp-no" value="5011005001003" /></div>
      <div class="group"><label>名称</label><textarea id="f-name">特定非営利活動法人ブリッジ・アジア・ジャパン
（Bridge Asia Japan）</textarea></div>
      <div class="group"><label>主たる事務所</label><input id="f-office" value="東京都渋谷区本町三丁目48番21-303号" /></div>
      <div class="group"><label>法人成立の年月日</label><input id="f-founded" value="平成28年4月4日" /></div>
      <div class="group"><label>目的等</label><textarea id="f-purpose" style="min-height:150px">この法人は、アジア太平洋地域において、教育、環境、平和構築等の分野で、国界を越えた市民社会の協力と交流を推進し、持続可能で平和な社会の実現に寄与することを目的とする。
この法人は、上記の目的を達成するため、次の事業を行う。
(1) 環境・平和の平和分野の国際交流事業
(2) 国際理解教育の推進事業
(3) 地域社会の課題解決に向けた国際協力事業
(4) 研究・調査・広業・政策提言事業
(5) その他、この法人の目的を達成するために必要な又は補助的活動</textarea></div>
      <div class="group"><label>役員に関する事項</label><textarea id="f-officers" style="min-height:130px">東京都渋谷区本町三丁目48番21-303号
理事　中島 かおり
東京都渋谷区本町三丁目48番21-303号
理事　石川 治江
東京都渋谷区本町三丁目48番21-303号
理事　根本 悦子
東京都渋谷区本町三丁目48番21-303号
理事　Sejima Shunsuke</textarea></div>
      <div class="group"><label>証明文</label><textarea id="f-cert-note">これは登記簿に記録されている閉鎖されていない事項の全部であることを証明した書面である。
（東京法務局渋谷出張所管轄）</textarea></div>
      <div class="group"><label>証明日</label><input id="f-cert-date" value="平成28年 4月13日" /></div>
      <div class="group"><label>法務局/登記官</label><input id="f-registry" value="東京法務局渋谷出張所" /></div>
      <div class="group"><label>登記官氏名</label><input id="f-issuer" value="岡戸 嘉信" /></div>
      <div class="group"><label>整理番号</label><input id="f-serial" value="T344310" /></div>
      <div class="group"><label>页码</label><input id="f-page" value="1 / 5" /></div>

      <div class="actions">
        <button type="button" class="primary" id="btn-pdf">保存 PDF</button>
        <button type="button" id="btn-print">打印</button>
        <button type="button" id="btn-save">导出JSON</button>
        <button type="button" id="btn-load">读取JSON</button>
        <button type="button" id="btn-reset">重置</button>
      </div>
      <div class="status" id="status"></div>
    </aside>

    <main class="preview-wrap">
      <section class="sheet" id="sheet">
        <div class="sheet-inner">
          <h1 class="doc-title">履歴事項全部証明書</h1>
          <div class="doc-sub">
            <div class="editable" id="ov-header-addr" data-key="header-addr" contenteditable="true"></div>
            <div class="editable" id="ov-header-org" data-key="header-org" contenteditable="true"></div>
          </div>

          <table class="registry">
            <tr>
              <th>会社法人等番号</th>
              <td><div class="editable corp-no" id="ov-corp-no" data-key="corp-no" contenteditable="true"></div></td>
            </tr>
            <tr>
              <th>名　称</th>
              <td><div class="editable" id="ov-name" data-key="name" contenteditable="true"></div></td>
            </tr>
            <tr>
              <th>主たる事務所</th>
              <td><div class="editable" id="ov-office" data-key="office" contenteditable="true"></div></td>
            </tr>
            <tr>
              <th>法人成立の年月日</th>
              <td><div class="editable" id="ov-founded" data-key="founded" contenteditable="true"></div></td>
            </tr>
            <tr>
              <th>目的等</th>
              <td><div class="editable purpose" id="ov-purpose" data-key="purpose" contenteditable="true"></div></td>
            </tr>
            <tr>
              <th>役員に関する事項</th>
              <td><div class="editable officers" id="ov-officers" data-key="officers" contenteditable="true"></div></td>
            </tr>
          </table>

          <div class="cert-block">
            <div class="editable" id="ov-cert-note" data-key="cert-note" contenteditable="true"></div>
            <div class="cert-meta">
              <div class="editable" id="ov-cert-date" data-key="cert-date" contenteditable="true"></div>
              <div class="editable" id="ov-registry" data-key="registry" contenteditable="true"></div>
            </div>
            <div class="issuer-line">
              登記官
              <span class="editable" id="ov-issuer" data-key="issuer" contenteditable="true"></span>
            </div>
          </div>

          <div class="footer-line">
            <div>整理番号 <span class="editable" id="ov-serial" data-key="serial" contenteditable="true"></span></div>
            <div class="editable" id="ov-page" data-key="page" contenteditable="true"></div>
          </div>
          <div class="note">※ 下線のあるものは抹消事項であることを示す。</div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const STORAGE_KEY = "baj-corporate-history-v3-html";
    const KEYS = [
      "header-addr","header-org","corp-no","name","office","founded",
      "purpose","officers","cert-note","cert-date","registry","issuer","serial","page"
    ];
    const defaults = {
      "header-addr": "東京都渋谷区本町三丁目48番21-303号",
      "header-org": "特定非営利活動法人ブリッジ・アジア・ジャパン（Bridge Asia Japan）",
      "corp-no": "5011005001003",
      name: "特定非営利活動法人ブリッジ・アジア・ジャパン\n（Bridge Asia Japan）",
      office: "東京都渋谷区本町三丁目48番21-303号",
      founded: "平成28年4月4日",
      purpose: "この法人は、アジア太平洋地域において、教育、環境、平和構築等の分野で、国界を越えた市民社会の協力と交流を推進し、持続可能で平和な社会の実現に寄与することを目的とする。\nこの法人は、上記の目的を達成するため、次の事業を行う。\n(1) 環境・平和の平和分野の国際交流事業\n(2) 国際理解教育の推進事業\n(3) 地域社会の課題解決に向けた国際協力事業\n(4) 研究・調査・広業・政策提言事業\n(5) その他、この法人の目的を達成するために必要な又は補助的活動",
      officers: "東京都渋谷区本町三丁目48番21-303号\n理事　中島 かおり\n東京都渋谷区本町三丁目48番21-303号\n理事　石川 治江\n東京都渋谷区本町三丁目48番21-303号\n理事　根本 悦子\n東京都渋谷区本町三丁目48番21-303号\n理事　Sejima Shunsuke",
      "cert-note": "これは登記簿に記録されている閉鎖されていない事項の全部であることを証明した書面である。\n（東京法務局渋谷出張所管轄）",
      "cert-date": "平成28年 4月13日",
      registry: "東京法務局渋谷出張所",
      issuer: "岡戸 嘉信",
      serial: "T344310",
      page: "1 / 5"
    };

    const setStatus = (message, isError = false) => {
      const statusElement = document.getElementById("status");
      statusElement.textContent = message || "";
      statusElement.style.color = isError ? "#c00" : "#067d17";
    };

    const syncToOverlay = () => {
      KEYS.forEach((key) => {
        const inputElement = document.getElementById("f-" + key);
        const overlayElement = document.getElementById("ov-" + key);
        if (!inputElement || !overlayElement) return;
        overlayElement.textContent = inputElement.value || "";
      });
    };

    const syncFromOverlay = (key) => {
      const inputElement = document.getElementById("f-" + key);
      const overlayElement = document.getElementById("ov-" + key);
      if (!inputElement || !overlayElement) return;
      inputElement.value = overlayElement.textContent || "";
    };

    const getData = () => {
      const data = {};
      KEYS.forEach((key) => {
        const inputElement = document.getElementById("f-" + key);
        if (inputElement) data[key] = inputElement.value;
      });
      return data;
    };

    const setData = (data) => {
      KEYS.forEach((key) => {
        const inputElement = document.getElementById("f-" + key);
        if (inputElement && data[key] !== undefined) inputElement.value = data[key];
      });
      syncToOverlay();
    };

    KEYS.forEach((key) => {
      const inputElement = document.getElementById("f-" + key);
      const overlayElement = document.getElementById("ov-" + key);
      if (inputElement) {
        inputElement.addEventListener("input", syncToOverlay);
        inputElement.addEventListener("change", syncToOverlay);
      }
      if (overlayElement) {
        overlayElement.addEventListener("input", () => syncFromOverlay(key));
        overlayElement.addEventListener("blur", () => syncFromOverlay(key));
      }
    });

    document.getElementById("btn-print").addEventListener("click", () => window.print());

    document.getElementById("btn-pdf").addEventListener("click", async () => {
      try {
        setStatus("正在生成 PDF...");
        const sheetElement = document.getElementById("sheet");
        const canvas = await html2canvas(sheetElement, {
          backgroundColor: "#ffffff",
          scale: 2,
          useCORS: true
        });
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ orientation: "portrait", unit: "mm", format: "a4" });
        const pageWidth = pdf.internal.pageSize.getWidth();
        const pageHeight = pdf.internal.pageSize.getHeight();
        const ratio = Math.min(pageWidth / canvas.width, pageHeight / canvas.height);
        const imageWidth = canvas.width * ratio;
        const imageHeight = canvas.height * ratio;
        pdf.addImage(
          canvas.toDataURL("image/jpeg", 0.98),
          "JPEG",
          (pageWidth - imageWidth) / 2,
          (pageHeight - imageHeight) / 2,
          imageWidth,
          imageHeight
        );
        pdf.save("corporate-history.pdf");
        setStatus("PDF 已保存");
      } catch (error) {
        setStatus("PDF失败: " + error.message, true);
        alert(error.message);
      }
    });

    document.getElementById("btn-save").addEventListener("click", () => {
      const data = getData();
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const anchor = document.createElement("a");
      anchor.href = URL.createObjectURL(blob);
      anchor.download = "corporate-history.json";
      anchor.click();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      setStatus("JSON 已导出");
    });

    document.getElementById("btn-load").addEventListener("click", () => {
      const fileInput = document.createElement("input");
      fileInput.type = "file";
      fileInput.accept = ".json,application/json";
      fileInput.addEventListener("change", () => {
        const selectedFile = fileInput.files[0];
        if (!selectedFile) return;
        const reader = new FileReader();
        reader.onload = () => {
          setData(JSON.parse(reader.result));
          setStatus("JSON 已读取");
        };
        reader.readAsText(selectedFile);
      });
      fileInput.click();
    });

    document.getElementById("btn-reset").addEventListener("click", () => {
      if (!confirm("重置为默认内容？")) return;
      setData(defaults);
      setStatus("已重置");
    });

    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) setData(JSON.parse(raw));
      else syncToOverlay();
    } catch (error) {
      syncToOverlay();
    }
  </script>
</body>
</html>
